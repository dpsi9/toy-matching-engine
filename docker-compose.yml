version: '3.9'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.7.1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 8

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: prediction_market
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  matching-engine:
    build:
      context: .
      dockerfile: matching-engine/Dockerfile
    depends_on:
      - kafka
      - postgres
    environment:
      KAFKA_BROKERS: kafka:29092
      ORDERS_TOPIC: orders
      FILLS_TOPIC: fills
      MATCHING_CONSUMER_GROUP: matching-engine
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/prediction_market
      WAL_PATH: /data/wal.log
      RUST_LOG: info
    volumes:
      - wal_data:/data

  api-service:
    build:
      context: .
      dockerfile: api-service/Dockerfile
    depends_on:
      - kafka
      - postgres
      - matching-engine
    environment:
      API_BIND_ADDR: 0.0.0.0:8080
      KAFKA_BROKERS: kafka:29092
      ORDERS_TOPIC: orders
      FILLS_TOPIC: fills
      WS_CONSUMER_GROUP: api-service-fills
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/prediction_market
      API_ORDERBOOK_QUERY_LIMIT: 1000
      RUST_LOG: info
    ports:
      - "8080:8080"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - api-service
    environment:
      BACKEND_HTTP_URL: http://api-service:8080
      NEXT_PUBLIC_WS_URL: ws://localhost:8080/ws
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  wal_data:
